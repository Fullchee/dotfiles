[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "detect-private-key" },
    { id = "check-added-large-files" },
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
]

[[repos]]
repo = "https://github.com/Yelp/detect-secrets"
rev = "v1.5.0"
hooks = [{ id = "detect-secrets"}]

[[repos]]
repo = "local"
hooks = [
    { id = "chezmoi-validate", name = "Validate chezmoi templates", entry = "chezmoi doctor", language = "system", pass_filenames = false },
    { id = "chezmoi-apply", name = "Run chezmoi apply for non-script files", entry = "chezmoi apply --include=files", language = "system", files = '^(?!.*\\.sh$).*$', pass_filenames = false },
]
