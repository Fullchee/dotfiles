[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "detect-private-key" },
    { id = "check-added-large-files" },
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
]

[[repos]]
repo = "https://github.com/Yelp/detect-secrets"
rev = "v1.5.0"
hooks = [{ id = "detect-secrets" }]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "chezmoi-validate"
name = "Dry-run chezmoi apply to catch template errors early"
entry = "chezmoi apply --dry-run --force --no-tty"
language = "system"
pass_filenames = false

[[repos.hooks]]
id = "chezmoi-apply"
name = "Run chezmoi apply for non-script files"
entry = "chezmoi apply --include=files,dirs --force --no-tty"
language = "system"
files = '^(?!.*\.sh$).*$'
pass_filenames = false
